<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또생성기</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #result {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            min-height: 60px;
        }

        .ball {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
        }

        .ball-yellow { background-color: #fbc02d; color: #333; text-shadow: none; } /* 1 ~ 10 */
        .ball-blue   { background-color: #1e88e5; } /* 11 ~ 20 */
        .ball-red    { background-color: #e53935; } /* 21 ~ 30 */
        .ball-gray   { background-color: #8e8e8e; } /* 31 ~ 40 */
        .ball-green  { background-color: #43a047; } /* 41 ~ 45 */
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <h1>대박을 꿈꾸다.....</h1><br>

    <button id="btn" class="btn btn-primary">로또 번호 생성하기</button>
    <div id="result"></div>

    <script>
        const btn = document.getElementById("btn");
        const result = document.getElementById('result');

        function getBallClass(num) {
            if (num <= 10) return 'ball-yellow';
            if (num <= 20) return 'ball-blue';
            if (num <= 30) return 'ball-red';
            if (num <= 40) return 'ball-gray';
            return 'ball-green';
        }

        btn.addEventListener("click", () => {
            const numbers = [];

            for (let i = 0; i < 6; i++) {
                let num = Math.floor(Math.random() * 45) + 1;

                while(true){
                    let overlap = false;

                    numbers.forEach(function(item, index) {
                        if(num == numbers[index]){
                            console.log(`현재 배열 상태는 ${numbers}이고, 중복 발생 번호는 ${num}입니다.`);
                            overlap = true;
                        }
                    });

                    if (overlap){
                        num = Math.floor(Math.random() * 45) + 1;
                        console.log(`새로운 로또 번호를 ${num}로 생성했습니다.`);
                    }
                    else{
                        numbers.push(num);
                        break;
                    }
                }
            }
            numbers.sort((a, b) => a - b);

            result.innerHTML = '';
            numbers.forEach((num) => {
                const ball = document.createElement('div');
                ball.classList.add('ball', getBallClass(num));
                ball.textContent = num;
                result.appendChild(ball);
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
