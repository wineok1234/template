<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        #result {
            display: flex;
            gap: 12px;
            margin-top: 30px;
            min-height: 70px;
            flex-wrap: wrap;
        }

        .ball {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .plus-sign {
            font-size: 24px;
            font-weight: bold;
            color: #adb5bd;
            margin: 0 2px;
        }

        .bonus-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bonus-label {
            font-size: 10px;
            color: #6c757d;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .ball-yellow { background: radial-gradient(circle at 35% 35%, #ffeb3b, #fbc02d); color: #333; } /* 1 ~ 10 */
        .ball-blue   { background: radial-gradient(circle at 35% 35%, #64b5f6, #1e88e5); } /* 11 ~ 20 */
        .ball-red    { background: radial-gradient(circle at 35% 35%, #e57373, #e53935); } /* 21 ~ 30 */
        .ball-gray   { background: radial-gradient(circle at 35% 35%, #b0bec5, #78909c); } /* 31 ~ 40 */
        .ball-green  { background: radial-gradient(circle at 35% 35%, #81c784, #43a047); } /* 41 ~ 45 */
    </style>
</head>
<body>

    <div class="lotto-card">
        <h1 class="title">대박을 꿈꾸다.....</h1>
        <button id="btn" class="btn btn-primary">로또 번호 생성하기</button>
        <div id="result"></div>
    </div>

    <script>
        const btn = document.getElementById("btn");
        const result = document.getElementById('result');

        function getBallClass(num) {
            if (num <= 10) return 'ball-yellow';
            if (num <= 20) return 'ball-blue';
            if (num <= 30) return 'ball-red';
            if (num <= 40) return 'ball-gray';
            return 'ball-green';
        }

        btn.addEventListener("click", () => {
            const numbers = [];

            while (numbers.length < 7) {
                const num = Math.floor(Math.random() * 45) + 1;
                if (!numbers.includes(num)) {
                    numbers.push(num);
                }
            }

            numbers.sort((a, b) => a - b);

            let bonusNum = numbers.pop();

            result.innerHTML = '';
            numbers.forEach((num) => {
                const ball = document.createElement('div');
                ball.classList.add('ball', getBallClass(num));
                ball.textContent = num;
                result.appendChild(ball);
            });

            const plus = document.createElement('div');
            plus.classList.add('plus-sign');
            plus.textContent = '+';
            result.appendChild(plus);

            const bonusWrapper = document.createElement('div');
            bonusWrapper.classList.add('bonus-wrapper');

            const bonusLabel = document.createElement('span');
            bonusLabel.classList.add('bonus-label');
            bonusLabel.textContent = '보너스';

            const bonusBall = document.createElement('div');
            bonusBall.classList.add('ball', getBallClass(bonusNum));
            bonusBall.textContent = bonusNum;

            bonusWrapper.appendChild(bonusLabel);
            bonusWrapper.appendChild(bonusBall);
            result.appendChild(bonusWrapper);
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
