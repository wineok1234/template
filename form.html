<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <title>GET vs POST</title>
</head>
<body>
   <h2>GET 방식 로그인 (절대 따라하지 말 것)</h2>
   <form action="" method="get">
      <input type="text" name="id" placeholder="아이디">
      <input type="password" name="password" placeholder="비밀번호">
      <input type="submit" value="로그인">
   </form>
</body>
</html>
