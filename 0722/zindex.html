<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card { position: relative; width: 300px; }
        .card img { width: 100%; display: block; }
        .card .caption {
            position: absolute;
            bottom: 20px; left: 20px;
            color: white;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="bird.jpg" alt="">
        <p class="caption">"Faith is the bird..." - Tagore</p>
    </div>
</body>
</html>
