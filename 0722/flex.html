<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <style>
        .container {
            width: 500px;
            height: 500px;
            background-color: lightgray;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: start;
        }
        .container  > div{
            color: white;
            line-height: 100px;
            text-align: center;    
            font-size: 40px;
            height: 100px;
            width: 100px;
        }     
        .blue {
            background-color: blue;
        }    
        .pink {
            background-color: palevioletred;
        }
        .green {
            background-color: green;
        }
</style>
</head>
<body>
    <div class="container">
        <div class="blue">A</div>
        <div class="pink">B</div>
        <div class="green">C</div>
    </div>
</body>
</html>
