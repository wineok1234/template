<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent  { position: relative; width: 300px; height: 300px; background: #eee; }
        .child   {
            position: absolute;  /* 부모 기준 */
            top: 20px; right: 20px;  /* parent 기준 우상단 */
            width: 80px; height: 80px; background: tomato;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
    </div>
</body>
</html>
