<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .one {
            width: 100%;
            height: 500px;
            position: relative;
            background-color: blue;
        }
        .two {
            width: 100px;
            height: 200px;
            position: absolute;
            top : 40px;
            background-color: red;
        }
        .three {
            width: 200px;
            height: 200px;
            background-color: green;
            position: absolute;
            top: 20px;
            z-index: 100;
        }
        .four {
            width: 200px;
            height: 200px;
            background-color: yellow;
            position: absolute;
            top: 20px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div class="one">
        <div class="two"></div>
        <div class="three"></div>
        <div class="four"></div>
    </div>
</body>
</html>
