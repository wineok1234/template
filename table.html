<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>표 태그 실습</title>
    <style>
      table, th, td { border: 1px solid black; border-collapse: collapse; }
      th, td { padding: 8px; }
   </style>
</head>
<body>
    <table>
        <caption>월요일 수업 시간표</caption>
        <tr>
            <th>교시</th>
            <th>과목</th>
            <th>강의실</th>
        </tr>
        <tr>
            <td>1교시</td>
            <td rowspan="2">HTML 기초</td>
            <td>301호</td>
        </tr>
        <tr>
            <td>2교시</td>
            <td>302호</td>
        </tr>
        <tr>
            <td>3교시</td>
            <td colspan="2">점심시간</td>
        </tr>
    </table>
</body>
</html>
