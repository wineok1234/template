<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <title>독특한 태그들</title>
</head>
<body>
   <!-- figure + figcaption -->
   <figure>
      <img src="hanra.jpg" alt="한라산 정상에서 본 백록담">
      <figcaption>그림 1. 한라산 백록담 (2026년 1월 촬영)</figcaption>
   </figure>

   <!-- mark -->
   <p>이번 시험 범위는 <mark>3장부터 5장까지</mark>임</p>

   <!-- abbr : 마우스를 올려볼 것 -->
   <p><abbr title="HyperText Markup Language">HTML</abbr>은 마크업 언어임</p>

   <!-- wbr : 브라우저 창을 좁혀가며 확인 -->
   <p>긴 주소 예시 : https://www.<wbr>verylongdomainname<wbr>.example<wbr>.com/<wbr>path</p>

   <!-- translate="no" -->
   <p translate="no">Galaxy, Genesis 같은 브랜드명은 번역되면 곤란함</p>
</body>
</html>
