<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap 실습</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- 실제 alert 창은 아님! -->
    <div class="alert alert-danger" role="alert">
        javascript alert창은 아닙니다!
    </div>

    <script>
        window.alert('이게 javascript alert 창입니다!!!!');
    </script>

    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#myModal">모달 열기</button>

    <div class="modal fade" id="myModal">
    <div class="modal-dialog">
        <div class="modal-content">
        <div class="modal-header"><h5>제목</h5></div>
        <div class="modal-body">내용입니다.</div>
                        <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="button" class="btn btn-primary">Save changes</button>
                    </div>
        </div>
    </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
