<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Summernote 에디터 테스트</title>

    <!-- 1. Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- 2. Summernote CSS (Bootstrap 5용) -->
    <link href="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote-bs5.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>글쓰기</h2>
    <form>
        <textarea id="myEditor" name="content"></textarea>
        <button type="button" class="btn btn-primary mt-3" onclick="showContent()">저장</button>
    </form>
</div>

<!-- 3. jQuery (Summernote는 jQuery 필수) -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- 4. Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- 5. Summernote JS (Bootstrap 5용) -->
<script src="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/summernote-bs5.min.js"></script>

<!-- ★ [수정 위치] 6. 한국어 언어팩 (에디터 실행 전에 먼저 로드) -->
<script src="https://cdn.jsdelivr.net/npm/summernote@0.9.0/dist/lang/summernote-ko-KR.min.js"></script>

<!-- 7. 에디터 실행 -->
<script>
    $(document).ready(function() {
        $('#myEditor').summernote({
            lang: 'ko-KR',           // 한국어 메뉴
            height: 300,             // 에디터 높이 (px)
            placeholder: '여기에 내용을 입력하세요...',
            toolbar: [
                ['style', ['bold', 'italic', 'underline']],
                ['font', ['fontsize', 'color']],
                ['para', ['ul', 'ol', 'paragraph']],
                ['insert', ['link', 'picture']],
                ['view', ['codeview']]
            ]
        });
    });

    // 저장 버튼 클릭 시 내용 확인
    function showContent() {
        const html = $('#myEditor').summernote('code');
        console.log(html);
    }
</script>

</body>
</html>
