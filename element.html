<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <title>요소, 태그, 속성</title>
</head>
<body>
   <!-- h1 요소 : 시작 태그 + 내용 + 끝 태그 -->
   <!-- title="..." 부분이 속성 -->
   <h1 title="마우스를 올리면 이 글이 보입니다">저는 요소입니다</h1>

   <!-- 빈 요소 : 끝 태그가 없음 -->
   <img src="kopo.jpg" alt="이미지를 못 찾으면 이 글이 보입니다">
   <br>
   <input type="text">
</body>
</html>
