<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <title>목록 태그 실습</title>
</head>
<body>
   <h2>라면 조리법 (순서 중요 → ol)</h2>
   <ol>
      <li>물 550ml를 끓임</li>
      <li>면과 스프를 넣음</li>
      <li>4분 30초 더 끓임</li>
   </ol>

   <h2>장바구니 (순서 무관 → ul)</h2>
   <ul>
      <li>라면</li>
      <li>계란</li>
      <li>대파</li>
   </ul>

   <h2>번호 스타일 바꾸기</h2>
   <ol type="I">
      <li>보기 하나</li>
      <li>보기 둘</li>
   </ol>

   <h2>실무 스타일 : 내비게이션 메뉴</h2>
   <ul>
      <li><a href="#home">홈</a></li>
      <li><a href="#about">소개</a></li>
      <li><a href="#contact">연락처</a></li>
   </ul>
</body>
</html>
