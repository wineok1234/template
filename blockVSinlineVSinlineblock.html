<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <title>블록 vs 인라인</title>
   <style>
      div  { background: lightblue; }
      span { background: lightpink; }
      img  { background: lightgreen; width: 100px; height: 60px; }
   </style>
</head>
<body>
   <div>블록 1</div>
   <div>블록 2</div>
   <!-- 내용이 짧아도 한 행을 통째로 차지 → 세로로 쌓임 -->

   <span>인라인 1</span>
   <span>인라인 2</span>
   <span>인라인 3</span>
   <!-- 글자 크기만큼만 차지 → 가로로 나란히 -->

   <p>
      <img src="a.jpg" alt="이미지1">
      <img src="b.jpg" alt="이미지2">
   </p>
   <!-- 나란히 배치되면서도 width/height가 먹힘 → 인라인블록 -->
</body>
</html>
