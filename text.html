<!DOCTYPE html>
<html lang="ko">
<head>
   <meta charset="UTF-8">
   <title>텍스트 태그 실습</title>
</head>
<body>
   <p>
      첫 번째 줄
      두 번째 줄
      세 번째 줄
   </p>
   <!-- 엔터를 쳤지만 한 줄로 출력됨 -->

   <p>
      첫 번째 줄<br>
      두 번째 줄<br>
      <strong>긴급 공지는 여기</strong>
   </p>
   <!-- br을 넣은 곳만 줄이 바뀜 -->

   <pre>
   ┌─────────┐
   │  pre는  │
   │공백 유지│
   └─────────┘
   </pre>
   <!-- 작성한 그대로 출력됨 -->
</body>
</html>
